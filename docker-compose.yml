services:
  postgres:
    image: postgres:16
    container_name: belleza_postgres
    environment:
      POSTGRES_USER: belleza_user
      POSTGRES_PASSWORD: belleza_pass
      POSTGRES_DB: belleza_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: belleza_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
